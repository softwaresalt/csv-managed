# autoharness Configuration
#
# Resolved harness configuration for this workspace.
# Written by autoharness install; updated by autoharness tune.
# Operator edits to this file are preserved on re-install and tuning.
#
# Schema: schemas/harness-config.schema.json

schema_version: "1.0.0"

# Installation preset: starter | standard | full
preset: full

# Additive stack classification used for composition
primary_stack_pack: cli-tool
stack_packs:
  - cli-tool

# Explicit artifact-class layers selected for installation
install_layers:
  - foundation
  - instructions
  - workflow
  - review
  - runtime
  - backlog
  - knowledge
  - overlays

# Capability packs enabled for this workspace
capability_packs:
  - backlogit
  - agent-engram
  - continuous-learning
  - strict-safety
  - release-observability
  - adversarial-review

# Backlog tool configuration
backlog:
  tool: backlogit
  directory: .backlogit
  suffix_map:
    feature: "F"
    chore: "C"
    task: "T"
    spike: "SP"
    deliberation: "D"
    bug: "B"
    epic: "E"
    subtask: "ST"
    shipment: "S"

# Long-lived knowledge artifact directories
docs:
  root: docs
  subdirectories:
    compound: compound
    plans: plans
    decisions: decisions
    memory: memory
    closure: closure
    design_docs: design-docs
    product_specs: product-specs

# Optional continuous-learning capability-pack configuration
continuous_learning:
  directory: ".autoharness/continuous-learning"
  capture_hooks: false
  environment_adapter: "none"
  promotion_threshold: 3

# Optional strict-safety capability-pack configuration
strict_safety:
  enabled: true
  require_approval_for:
    - destructive

# Model routing preferences (map tiers to model identifiers and per-tier config)
model_routing:
  tier1:
    model: gpt-5.4-mini
    reasoning_effort: ""
    model_provider: ""
    model_family: "gpt-5.4-mini"
  tier2:
    model: claude-sonnet-4.6
    reasoning_effort: ""
    model_provider: ""
    model_family: "claude-sonnet-4.6"
  tier3:
    model: claude-opus-4.6
    reasoning_effort: ""
    model_provider: ""
    model_family: "claude-opus-4.6"
  orchestrator:
    model_family: "gpt-5.4"
    reasoning_effort: ""
    model_provider: ""

# AI CLI tool startup configuration
ai_tools:
  copilot_cli:
    exe_path: "copilot"

# Optional browser-automation capability configuration
browser:
  cli: "agent-browser"
  headless_flag: "--headless"

# Optional iterative-experiment skill configuration
experiments:
  branch_prefix: "experiment/"
  results_dir: "docs/experiments"

# Explicit template variable overrides
overrides:
  PROJECT_NAME: csv-managed
