# .autoharness/workspace-profile.yaml
schema_version: "1.0.0"
generated_at: "2026-05-21T10:12:00-05:00"
workspace_path: "D:\\Source\\GitHub\\csv-managed"

languages:
  primary: "Rust"
  version: "2024"
  secondary: []

frameworks:
  list: []
  mcp_sdk: null
  mcp_transport: null

primary_stack_pack: "cli-tool"
stack_packs:
  - "cli-tool"

build:
  tool: "cargo"
  command: "cargo build"
  check_command: "cargo check --all-targets"

test:
  runner: "cargo test"
  command: "cargo test"
  directory: "tests/"

lint:
  tool: "clippy"
  command: "cargo clippy -- -D warnings"

format:
  tool: "rustfmt"
  command: "cargo fmt --all -- --check"
  check_command: "cargo fmt --all -- --check"

ci:
  platform: "GitHub Actions"
  pipeline_steps:
    - "checkout"
    - "install-toolchain"
    - "cache-registry"
    - "cache-build"
    - "fmt-check"
    - "clippy"
    - "test"
    - "build-release"
  quality_gates:
    - name: "fmt"
      command: "cargo fmt -- --check"
    - name: "clippy"
      command: "cargo clippy --all-targets --all-features -- -D warnings"
    - name: "test"
      command: "cargo test --all-targets --all-features"
    - name: "build"
      command: "cargo build --release"
  poll_interval: 30
  max_wait: 600
  notes: "GitHub Actions with cargo caching, single lint-test job"

structure:
  source_layout: "src/"
  test_layout: "tests/"
  doc_layout: "docs/"
  existing_harness_artifacts:
    - ".github/agents/ (18 agent files — speckit suite, build-orchestrator, rpi-agent, etc.)"
    - ".github/instructions/rust.instructions.md"
    - ".github/skills/build-feature/, compact-context/"
    - ".github/prompts/ (9 speckit prompt files)"
    - ".github/copilot-instructions.md"

runtime_surfaces:
  web_ui: false
  public_api: false
  background_jobs: false
  browser_tooling: []
  deployment_manifests: []

conventions:
  code_style:
    edition: "2024"
    error_handling: "anyhow::Result with Context"
    logging: "log crate macros (info!, debug!, error!) with env_logger"
    streaming: "Row-by-row CSV streaming, never load entire files"
    function_size: "Under 100 lines"
    string_handling: "Prefer &str and Cow<'_, str> over String cloning"
  git:
    remote: "https://github.com/softwaresalt/csv-managed.git"
    default_branch: "main"
    commit_style: "conventional"
  documentation:
    style: "/// doc comments, //! module-level Rustdoc"
    adr_location: "docs/decisions/"
    api_docs: "rustdoc"

